{% extends "core/base.html" %}
{% block content %}

<form method="post" id="checkout-form">
  {% csrf_token %}

  <input type="hidden" name="payment_method" id="payment_method" value="COD">

  <div class="container my-5">
    <div class="row g-4">

      <!-- LEFT -->
      <div class="col-12 col-lg-7">
        <div class="card p-4 shadow-sm">
          <h5 class="fw-bold mb-3">Delivery Address</h5>

          <div class="mb-3">
            <label>Full Name</label>
            <input type="text" class="form-control" name="name" required>
          </div>

          <div class="mb-3">
            <label>Mobile</label>
            <input type="tel" class="form-control" name="phone" required>
          </div>

          <div class="mb-3">
            <label>Address</label>
            <textarea class="form-control" name="address" required></textarea>
          </div>

        </div>
      </div>

      <!-- RIGHT -->
      <div class="col-12 col-lg-5">
        <div class="card p-4 shadow-sm sticky-top" style="top:100px;">
          <h5 class="fw-bold mb-3">Order Summary</h5>

          <div class="d-flex justify-content-between">
            <span>Subtotal</span>
            <strong>₹{{ total }}</strong>
          </div>

          <div class="d-flex justify-content-between mt-2">
            <span>Delivery</span>
            <span class="text-success">FREE</span>
          </div>

          <hr>

          <div class="d-flex justify-content-between fs-5">
            <strong>Total</strong>
            <strong>₹{{ total }}</strong>
          </div>

          <!-- ✅ Buttons -->
          <button type="submit" class="btn btn-warning w-100 mt-4">
            Place Order (COD)
          </button>

          <button type="button" class="btn btn-dark w-100 mt-3"
                  onclick="payOnline()">
            Pay Online
          </button>

        </div>
      </div>

    </div>
  </div>

</form>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function payOnline() {

    // set payment method
    document.getElementById("payment_method").value = "ONLINE";

    fetch("{% url 'create_payment' %}")
    .then(response => response.json())
    .then(data => {

        var options = {
            "key": "{{ razorpay_key }}",
            "amount": data.amount,
            "currency": "INR",
            "name": "Harsha Appliances",
            "description": "Order Payment",
            "order_id": data.id,

            "handler": function (response){
                document.getElementById("checkout-form").submit();
            }
        };

        var rzp = new Razorpay(options);
        rzp.open();
    })
    .catch(error => {
        console.log("Error:", error);
        alert("Payment failed. Try again.");
    });
}
</script>

{% endblock %}
